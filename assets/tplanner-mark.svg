<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="TPlanner mark">
  <defs>
    <linearGradient id="tp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0c060"/>
      <stop offset="48%"  stop-color="#e0608a"/>
      <stop offset="100%" stop-color="#8a58f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="100" height="100" rx="22" fill="#060910"/>
  <!-- Shared T/P vertical stem -->
  <rect x="20" y="18" width="13" height="64" rx="3" fill="url(#tp)"/>
  <!-- T crossbar (top horizontal) -->
  <rect x="20" y="18" width="58" height="13" rx="3" fill="url(#tp)"/>
  <!-- P bowl — D-curve from base of crossbar back to stem -->
  <path d="M 33,31 L 33,57 Q 76,57 76,44 Q 76,31 33,31 Z" fill="url(#tp)"/>
  <!-- Dynamic accent dash below stem — suggests motion/planning -->
  <rect x="20" y="88" width="26" height="5" rx="2.5" fill="url(#tp)" opacity="0.45"/>
</svg>
